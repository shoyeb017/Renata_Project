databases:
  - name: renata-project-db
    databaseName: shift_analytics
    plan: free
    region: oregon

services:
  # ---- Backend: Django REST API ----
  - type: web
    name: renata-project-backend
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py seed_config &&
      python manage.py ingest_shifts
    startCommand: gunicorn shift_analytics.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: renata-project-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: renata-project-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://renata-project.onrender.com

  # ---- Frontend: React (Vite) static site ----
  - type: web
    name: renata-project-frontend
    env: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://renata-project-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
